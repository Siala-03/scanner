services:
  - type: web
    name: scanner-backend
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start:dev
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: WEB_ORIGIN
        value: https://servv-psi.vercel.app
      - key: DATABASE_URL
        sync: false

databases:
  - name: scanner-db
    region: oregon
    plan: free
    postgresMajorVersion: 15
